<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Seatwork 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar navbar-expand-sm bg-dark navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand"><b>Flower Boutique</b></span>
    </div>

    <form class="d-flex">
        <button class="btn btn-primary" type="button" style="background-color: rgb(250, 195, 45); border-color: rgb(214, 151, 63);">PROMO</button>
    </form>
</header>

<main>
   <div class="container text-center">
        <h3>Looking for a bouquet?</h3>
        <p>Input your budget in the space below.</p>
        <input class="form-control me-2" type="number" placeholder="Enter budget">
   </div> 

   <br>
   <div class="row">
        <div class="col-md-4">
        <button type="button">Flowers & Discounts</button>
        <div id="discounts"></div>
        </div>

        <div class="col-md-4">
        <button type="button">Shop Location</button>
        <div id="location"></div>
        </div>
   </div>

</main>

<footer class="bg-dark text-white fixed-bottom text-center">
    <p>© 2026 Flower Boutique</p>
</footer>

<script src=main.js></script>

</body>

</html>
